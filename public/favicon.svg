<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1a2f5e"/>

  <!-- Open book base -->
  <path d="M12 42 C12 40 14 39 16 39 L30 39 L30 20 C30 18.5 28.5 17 27 17 L16 17 C14 17 12 18.5 12 20 Z" fill="#c9a84c" opacity="0.9"/>
  <path d="M52 42 C52 40 50 39 48 39 L34 39 L34 20 C34 18.5 35.5 17 37 17 L48 17 C50 17 52 18.5 52 20 Z" fill="#e8c96a" opacity="0.9"/>

  <!-- Spine -->
  <rect x="30" y="17" width="4" height="25" rx="1" fill="#f0d080"/>

  <!-- Book lines (pages) left -->
  <line x1="17" y1="24" x2="28" y2="24" stroke="#1a2f5e" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="17" y1="28" x2="28" y2="28" stroke="#1a2f5e" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="17" y1="32" x2="28" y2="32" stroke="#1a2f5e" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Book lines (pages) right -->
  <line x1="36" y1="24" x2="47" y2="24" stroke="#1a2f5e" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="36" y1="28" x2="47" y2="28" stroke="#1a2f5e" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="36" y1="32" x2="47" y2="32" stroke="#1a2f5e" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Bottom flat base of book -->
  <path d="M11 42 L32 45 L53 42 L53 44 Q32 47 11 44 Z" fill="#c9a84c" opacity="0.8"/>

  <!-- Mortarboard cap on top -->
  <ellipse cx="32" cy="12" rx="10" ry="2.5" fill="#f0d080"/>
  <rect x="29" y="9" width="6" height="5" rx="1" fill="#e8c96a"/>
  <line x1="42" y1="12" x2="45" y2="17" stroke="#f0d080" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="45" cy="18" r="1.8" fill="#c9a84c"/>
</svg>
